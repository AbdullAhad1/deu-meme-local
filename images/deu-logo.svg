<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a4b8c" stroke-width="4"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#1a4b8c" stroke-width="2"/>
  
  <!-- Text along top arc (Korean) -->
  <defs>
    <path id="topArc" d="M 100,100 m -65,0 a 65,65 0 1,1 130,0"/>
    <path id="bottomArc" d="M 35,100 a 65,65 0 0,0 130,0"/>
  </defs>
  <text font-size="14" font-weight="bold" fill="#1a4b8c" letter-spacing="6">
    <textPath href="#topArc" startOffset="15%">동 의 대 학 교</textPath>
  </text>
  <text font-size="11" font-weight="bold" fill="#1a4b8c" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="5%">DONG-EUI UNIVERSITY</textPath>
  </text>
  
  <!-- Shield shape -->
  <path d="M 70,55 L 130,55 L 130,120 Q 130,145 100,155 Q 70,145 70,120 Z" fill="#1a4b8c"/>
  
  <!-- DEU text inside shield -->
  <text x="100" y="115" text-anchor="middle" font-size="32" font-weight="bold" fill="#ffffff" font-family="serif" font-style="italic">Deu</text>
  
  <!-- 1977 -->
  <text x="100" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a4b8c">1977</text>
  
  <!-- Dots -->
  <circle cx="38" cy="100" r="3" fill="#1a4b8c"/>
  <circle cx="162" cy="100" r="3" fill="#1a4b8c"/>
</svg>
